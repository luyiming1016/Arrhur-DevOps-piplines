name: CI Pipeline

on:
  push:
    branches: [ main ]
    
jobs:
  build:
    runs-on : ubunte-latest

    steps:
      - name: Checout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 16

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test
    